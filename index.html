<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulo Fernando | Consultoria Elite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0071ff;
            --primary-glow: rgba(0, 113, 255, 0.4);
            --accent: #f5c518;
            --bg-deep: #030303;
            --bg-surface: rgba(25, 25, 30, 0.7); /* Ligeiramente mais claro */
            --bg-surface-hover: rgba(35, 35, 40, 0.85);
            --text-pure: #ffffff;
            --text-gray: #d4d4d8; /* Cinza mais claro para leitura no sol */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- RESET E BASES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-deep);
            color: var(--text-pure); 
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        /* --- FUNDO DE VÍDEO AJUSTADO (MAIS CLARO) --- */
        .master-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .master-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(50%); /* Aumentado de 35% para 50% */
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            /* Gradiente suavizado para não escurecer tanto o topo e o meio */
            background: linear-gradient(180deg, rgba(3,3,3,0.2) 0%, rgba(3,3,3,0.6) 60%, rgba(3,3,3,0.9) 100%);
            z-index: -1;
        }

        /* --- NAVBAR --- */
        #navbar {
            position: fixed;
            top: 0; width: 100%;
            padding: 24px 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        #navbar.scrolled {
            background: rgba(15, 15, 18, 0.8);
            backdrop-filter: blur(30px);
            padding: 16px 6%;
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-logo { font-size: 1.25rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .nav-logo span { color: var(--primary); }

        /* --- HERO CORRIGIDO (TÍTULO DESENCAVALADO) --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: url('image.png') no-repeat right bottom / contain;
        }

        .hero-content { max-width: 900px; z-index: 2; }
        .hero-title { 
            font-size: clamp(3.5rem, 11vw, 8.5rem); 
            font-weight: 900; 
            line-height: 0.95; /* Aumentado para desencaverar */
            margin-bottom: 30px; 
            letter-spacing: -2px; /* Reduzido o aperto das letras */
            text-transform: uppercase;
            animation: fadeInUp 1s ease both;
        }

        .hero-subtitle { 
            font-size: 1.15rem; color: var(--text-gray); 
            max-width: 550px; border-left: 3px solid var(--primary);
            padding-left: 28px; animation: fadeInUp 1s ease 0.3s both;
        }

        /* --- CONTEÚDO --- */
        .main-wrapper { position: relative; padding-bottom: 180px; }
        .container { max-width: 1300px; margin: 0 auto; padding: 100px 6%; }

        /* --- SOBRE --- */
        .about-section { display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; margin-bottom: 140px; align-items: center; }
        .about-text h2 { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 24px; letter-spacing: -1.5px; }
        .about-box { 
            background: var(--bg-surface); padding: 48px; border-radius: 28px; 
            border: 1px solid var(--glass-border); backdrop-filter: blur(20px); 
        }

        /* --- GRID DE PLANOS --- */
        .section-header { margin-bottom: 60px; }
        .section-header h2 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .plan-label { position: relative; cursor: pointer; display: block; height: 100%; }
        .plan-input { display: none; }

        .plan-card {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            padding: 40px 32px;
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .plan-label:hover .plan-card {
            transform: translateY(-10px);
            background: var(--bg-surface-hover);
            border-color: var(--primary);
        }

        .plan-input:checked + .plan-card {
            border-color: var(--primary);
            background: rgba(0, 113, 255, 0.12);
            box-shadow: 0 0 40px var(--primary-glow);
        }
